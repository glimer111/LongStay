# Пример конфига nginx для Long Stay с раздачей загрузок по /uploads/
# Скопируйте в /etc/nginx/sites-available/ и сделайте симлинк в sites-enabled.
# Замените YOUR_DOMAIN и путь /var/www/long-stay на свои.

upstream long_stay_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;   # например longstay.example.com или 199.68.199.143

    # Загрузки — отдаём статику напрямую, не через Node
    location /uploads/ {
        alias /var/www/long-stay/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Всё остальное — Next.js
    location / {
        proxy_pass http://long_stay_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
